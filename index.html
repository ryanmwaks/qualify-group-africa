<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>

    <!-- Primary meta -->
    <title>Marine &amp; Cargo Surveyors in Kenya | Qualify Group Africa</title>
    <meta name="description" content="QUALIFY Group Africa Ltd — independent marine inspection, cargo surveying, quality assurance, certification readiness, training and digital QMS, based in Mombasa, Kenya." />
    <meta name="theme-color" content="#062B4F" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QUALIFY Group Africa Ltd" />
    <meta property="og:title" content="Marine &amp; Cargo Surveyors in Kenya | Qualify Group Africa" />
    <meta property="og:description" content="Independent marine inspection, cargo surveying, quality assurance, certification readiness and digital QMS — based in Mombasa, Kenya." />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Marine &amp; Cargo Surveyors in Kenya | Qualify Group Africa" />
    <meta name="twitter:description" content="Independent marine inspection, cargo surveying, quality assurance and certification readiness — Mombasa, Kenya." />
    <meta name="twitter:image" content="/favicon.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Google Fonts — preconnect first to eliminate DNS lookup latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
