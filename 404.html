<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QUALIFY Group Africa</title>
    <script>
      // GitHub Pages SPA redirect — store the intended URL in sessionStorage
      // then redirect to the base so index.html loads and restores the route
      sessionStorage.redirect = location.href;
      var base = "/qualify-group-africa/";
      location.replace(
        location.protocol + "//" + location.hostname +
        (location.port ? ":" + location.port : "") + base
      );
    </script>
  </head>
  <body></body>
</html>
