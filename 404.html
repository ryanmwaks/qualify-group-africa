<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>QUALIFY Group Africa</title>
  <script>
    // GitHub Pages SPA redirect — preserves path and query for client-side router
    // pathSegmentsToKeep = 1 for project pages (/qualify-group-africa/)
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
