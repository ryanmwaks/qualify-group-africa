[build]
  base    = "Personal/DevOps/Qualify"
  command = "npm run build"
  publish = "Personal/DevOps/Qualify/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html (TanStack Router handles the rest)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
